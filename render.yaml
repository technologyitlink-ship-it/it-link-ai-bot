services:
  - type: web
    name: it-link-ai-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python it_link_bot.py
    envVars:
      - key: OPENAI_API_KEY
        scope: run
        value: ${OPENAI_API_KEY}
      - key: VERIFY_TOKEN
        scope: run
        value: itlink_verify_token_123
      - key: PAGE_ACCESS_TOKEN
        scope: run
        value: ${PAGE_ACCESS_TOKEN}
